name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  # ─────────────────────────────
  # macOS Build
  # ─────────────────────────────
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        app: [forgeq, forgestudio]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }} for macOS
        run: node build.js --app=${{ matrix.app }} --platform=mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-mac
          path: |
            dist/${{ matrix.app }}/*.dmg
            dist/${{ matrix.app }}/*.zip
          retention-days: 7


  # ─────────────────────────────
  # Windows Build
  # ─────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        app: [forgeq, forgestudio]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }} for Windows
        run: node build.js --app=${{ matrix.app }} --platform=win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows
          path: dist/${{ matrix.app }}/*.exe
          retention-days: 7


  # ─────────────────────────────
  # Linux Build
  # ─────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [forgeq, forgestudio]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Build ${{ matrix.app }} for Linux
        run: node build.js --app=${{ matrix.app }} --platform=linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-linux
          path: |
            dist/${{ matrix.app }}/*.AppImage
            dist/${{ matrix.app }}/*.deb
          retention-days: 7


  # ─────────────────────────────
  # Release
  # ─────────────────────────────
  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: List files
        run: find release-files -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-files/**/*.dmg
            release-files/**/*.zip
            release-files/**/*.exe
            release-files/**/*.AppImage
            release-files/**/*.deb