name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:

  # ─────────────────────────────────────────────
  #  macOS  →  .dmg  (builds both apps)
  # ─────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        app: [forgeq, forgestudio]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: .

      - name: Debug dir
        run: pwd && ls -la package*.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }} for macOS
        run: node build.js --app=${{ matrix.app }} --platform=mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-mac
          path: dist/${{ matrix.app }}/*.dmg
          retention-days: 7

  # ─────────────────────────────────────────────
  #  Windows  →  .exe  (builds both apps)
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        app: [forgeq, forgestudio]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: .

      - name: Debug dir
        run: pwd && ls -la package*.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }} for Windows
        run: node build.js --app=${{ matrix.app }} --platform=win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows
          path: dist/${{ matrix.app }}/*.exe
          retention-days: 7

  # ─────────────────────────────────────────────
  #  Linux  →  .AppImage + .deb  (builds both apps)
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [forgeq, forgestudio]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: .

      - name: Debug dir
        run: pwd && ls -la package*.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Build ${{ matrix.app }} for Linux
        run: node build.js --app=${{ matrix.app }} --platform=linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-linux
          path: |
            dist/${{ matrix.app }}/*.AppImage
            dist/${{ matrix.app }}/*.deb
          retention-days: 7

  # ─────────────────────────────────────────────
  #  GitHub Release  →  attaches all 6 files
  #  (runs only on tag push, after all builds pass)
  # ─────────────────────────────────────────────
  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: List files (debug)
        run: find release-files -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-files/**/*.dmg
            release-files/**/*.exe
            release-files/**/*.AppImage
            release-files/**/*.deb
